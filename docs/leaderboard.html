<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psych Engine Ultra — Leaderboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #08080f;
    --panel: #0d0d1a;
    --border: #1e1e3a;
    --purple: #c084fc;
    --purple-dark: #7c3aed;
    --muted: #5a5a7a;
    --white: #ffffff;
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #b45309;
  }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-size: 18px; color: var(--purple); letter-spacing: 3px; font-weight: bold; }
  .nav-sub  { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }
  .nav-links { display: flex; gap: 24px; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 12px; letter-spacing: 1px; transition: color .2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--purple); }

  /* HERO */
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    left: 0; top: 0; width: 4px; height: 100%;
    background: var(--purple);
  }
  .hero-title { font-size: 42px; color: var(--white); letter-spacing: 4px; margin-bottom: 8px; }
  .hero-title span { color: var(--purple); }
  .hero-sub { font-size: 13px; color: var(--muted); letter-spacing: 2px; margin-bottom: 32px; }
  .stats-row { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; }
  .stat-box { text-align: center; }
  .stat-box .num { font-size: 28px; color: var(--purple); font-weight: bold; }
  .stat-box .lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }

  /* FILTERS */
  .filters {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--purple);
    color: var(--purple);
  }
  .search-wrap { margin-left: auto; position: relative; }
  .search-wrap input {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px 8px 36px;
    color: var(--white);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--purple); }
  .search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 8px; font-size: 14px; }

  /* TABLE */
  .table-wrap { padding: 24px 40px; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table thead th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
  }
  .lb-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    cursor: default;
  }
  .lb-table tbody tr:hover { background: rgba(192,132,252,0.05); }
  .lb-table tbody td { padding: 14px 16px; font-size: 14px; }

  .rank-num { font-size: 16px; font-weight: bold; min-width: 40px; }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .rank-other { color: var(--muted); }

  .player-cell { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold; color: var(--purple);
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .avatar.gold   { border-color: var(--gold); }
  .avatar.silver { border-color: var(--silver); }
  .avatar.bronze { border-color: var(--bronze); }
  .player-name  { font-size: 15px; font-weight: bold; }
  .player-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: rgba(192,132,252,0.15); color: var(--purple);
    letter-spacing: 1px; margin-left: 6px;
  }
  .country-flag { font-size: 18px; }
  .level-badge {
    padding: 4px 10px; border-radius: 4px;
    background: rgba(192,132,252,0.1);
    color: var(--purple); font-size: 12px; letter-spacing: 1px;
  }
  .score-val  { font-size: 15px; font-weight: bold; color: var(--white); }
  .acc-val    { font-size: 13px; }
  .acc-ss     { color: #a78bfa; }
  .acc-s      { color: #60a5fa; }
  .acc-a      { color: #34d399; }
  .acc-b      { color: #fbbf24; }
  .acc-other  { color: var(--muted); }
  .songs-val  { color: var(--muted); font-size: 13px; }

  /* TOP 3 highlight */
  .lb-table tbody tr.top1 { background: rgba(251,191,36,0.04); }
  .lb-table tbody tr.top2 { background: rgba(148,163,184,0.04); }
  .lb-table tbody tr.top3 { background: rgba(180,83,9,0.04);  }

  /* LOADING / EMPTY */
  .state-msg {
    text-align: center; padding: 80px 20px;
    color: var(--muted); font-size: 14px; letter-spacing: 2px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--purple); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  footer {
    text-align: center; padding: 32px; color: var(--muted);
    font-size: 11px; letter-spacing: 1px; border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  footer a { color: var(--purple); text-decoration: none; }

  @media (max-width: 768px) {
    nav { padding: 14px 16px; }
    .filters { padding: 14px 16px; }
    .table-wrap { padding: 16px; }
    .hero { padding: 40px 16px 28px; }
    .hero-title { font-size: 28px; }
    .lb-table thead th:nth-child(4),
    .lb-table tbody td:nth-child(4),
    .lb-table thead th:nth-child(6),
    .lb-table tbody td:nth-child(6) { display: none; }
    .search-wrap { margin-left: 0; width: 100%; }
    .search-wrap input { width: 100%; }
  }
</style>
</head>
<body>

<nav>
  <div>
    <div class="nav-logo">PSYCH ENGINE ULTRA</div>
    <div class="nav-sub">GLOBAL LEADERBOARD</div>
  </div>
  <div class="nav-links">
    <a href="#" class="active">LEADERBOARD</a>
    <a href="https://github.com/Samedcan1234/Psych-Engine-Ultra-Android" target="_blank">GITHUB</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-title">GLOBAL <span>RANKING</span></div>
  <div class="hero-sub">EN İYİ OYUNCULAR / TOP PLAYERS</div>
  <div class="stats-row">
    <div class="stat-box"><div class="num" id="stat-players">-</div><div class="lbl">PLAYERS</div></div>
    <div class="stat-box"><div class="num" id="stat-songs">-</div><div class="lbl">SONGS PLAYED</div></div>
    <div class="stat-box"><div class="num" id="stat-top">-</div><div class="lbl">TOP SCORE</div></div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">ALL TIME</button>
  <button class="filter-btn" onclick="setFilter('week',this)">THIS WEEK</button>
  <button class="filter-btn" onclick="setFilter('today',this)">TODAY</button>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search player..." oninput="filterTable()" />
  </div>
</div>

<div class="table-wrap">
  <div id="loading-state" class="state-msg">
    <div class="spinner"></div>
    LOADING...
  </div>
  <table class="lb-table" id="lb-table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>PLAYER</th>
        <th>COUNTRY</th>
        <th>LEVEL</th>
        <th>TOTAL SCORE</th>
        <th>BEST ACC</th>
        <th>SONGS</th>
      </tr>
    </thead>
    <tbody id="lb-body"></tbody>
  </table>
  <div id="empty-state" class="state-msg" style="display:none">
    NO PLAYERS YET
  </div>
</div>

<footer>
  <p>PSYCH ENGINE ULTRA &mdash; <a href="https://github.com/Samedcan1234/Psych-Engine-Ultra-Android" target="_blank">GITHUB</a></p>
  <p style="margin-top:8px;font-size:10px;">Last updated: <span id="last-update">-</span></p>
</footer>

<script>
const SUPABASE_URL = "https://ubhglndbbzidunjgnpqi.supabase.co";
const SUPABASE_KEY = "SENIN_ANON_KEY";

const COUNTRY_FLAGS = {
  "Turkey":"🇹🇷","United States":"🇺🇸","United Kingdom":"🇬🇧",
  "Germany":"🇩🇪","France":"🇫🇷","Japan":"🇯🇵",
  "Brazil":"🇧🇷","Russia":"🇷🇺","Other":"🌍"
};

var allData = [];
var currentFilter = 'all';

async function fetchLeaderboard() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/global_leaderboard?select=*`, {
      headers: { apikey: SUPABASE_KEY, Accept: "application/json" }
    });
    const data = await res.json();
    allData = data;
    renderTable(data);
    updateStats(data);
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('loading-state').innerHTML = '<p style="color:#ff5555">CONNECTION ERROR</p>';
  }
}

function updateStats(data) {
  const totalPlayers = data.length;
  const totalSongs   = data.reduce((a,p) => a + (p.songs_played||0), 0);
  const topScore     = data.length > 0 ? data[0].total_score : 0;
  document.getElementById('stat-players').textContent = totalPlayers.toLocaleString();
  document.getElementById('stat-songs').textContent   = totalSongs.toLocaleString();
  document.getElementById('stat-top').textContent     = topScore.toLocaleString();
}

function renderTable(data) {
  document.getElementById('loading-state').style.display = 'none';
  const tbody = document.getElementById('lb-body');
  if (data.length === 0) {
    document.getElementById('empty-state').style.display = 'block';
    return;
  }
  document.getElementById('lb-table').style.display = 'table';
  document.getElementById('empty-state').style.display = 'none';

  tbody.innerHTML = data.map((p, i) => {
    const pos = i + 1;
    const rankClass = pos === 1 ? 'top1' : pos === 2 ? 'top2' : pos === 3 ? 'top3' : '';
    const rankNum   = pos === 1 ? '<span class="rank-num rank-1">🥇</span>'
                    : pos === 2 ? '<span class="rank-num rank-2">🥈</span>'
                    : pos === 3 ? '<span class="rank-num rank-3">🥉</span>'
                    : `<span class="rank-num rank-other">${pos}</span>`;
    const avatarClass = pos === 1 ? 'gold' : pos === 2 ? 'silver' : pos === 3 ? 'bronze' : '';
    const initials = (p.username||'?').substring(0,2).toUpperCase();
    const flag = COUNTRY_FLAGS[p.country] || '🌍';
    const acc  = (p.best_accuracy||0).toFixed(1);
    const accClass = acc >= 99 ? 'acc-ss' : acc >= 95 ? 'acc-s' : acc >= 85 ? 'acc-a' : acc >= 70 ? 'acc-b' : 'acc-other';
    const badge = pos <= 3 ? `<span class="player-badge">${pos===1?'CHAMPION':pos===2?'RUNNER UP':'TOP 3'}</span>` : '';

    return `<tr class="${rankClass}">
      <td>${rankNum}</td>
      <td><div class="player-cell">
        <div class="avatar ${avatarClass}">${initials}</div>
        <div>
          <div class="player-name">${p.username||'Unknown'}${badge}</div>
        </div>
      </div></td>
      <td><span class="country-flag">${flag}</span></td>
      <td><span class="level-badge">Lv.${p.level||1}</span></td>
      <td><span class="score-val">${(p.total_score||0).toLocaleString()}</span></td>
      <td><span class="${accClass}">${acc}%</span></td>
      <td><span class="songs-val">${p.songs_played||0}</span></td>
    </tr>`;
  }).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterTable();
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(p => {
    const nameMatch = (p.username||'').toLowerCase().includes(q);
    if (currentFilter === 'all') return nameMatch;
    return nameMatch;
  });
  renderTable(filtered);
}

fetchLeaderboard();
setInterval(fetchLeaderboard, 30000);
</script>
</body>
</html>
